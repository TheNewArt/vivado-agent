vivado:
  path: "D:\\001software\\Vivado\\2020.2\\bin\\vivado.bat"
  version: "2020.2"
  mode: "batch"
  tcl_timeout: 3600

project:
  name: ""
  rtl_dir: "./src/hdl"
  tb_dir: "./src/tb"
  output_dir: "./output"
  sim_cache_dir: "./xsim_cache"

optimization:
  incremental_compile: true
  multithreaded: true
  max_threads: 0  # 0 = auto-detect
  waveform_crop: true
  terminate_on_deadlock: true
  log_level: "info"

llm:
  enabled: true
  provider: "openai-compatible"
  model: "moonshot/kimi-k2.6"
  base_url: "https://aiapi.ihep.ac.cn/apiv2"
  # API key from env: LLM_API_KEY
  temperature: 0.1
  max_tokens: 4096